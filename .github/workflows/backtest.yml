name: Signal Bot Backtest

# Manual trigger ONLY - deliberately no schedule. This pulls months of
# historical data and can take several minutes to run (paced API calls +
# a full historical replay), which is fine for an occasional validation
# pass but would be wasteful and pointless every 5 minutes like the live
# heartbeat/signal workflow. Run this whenever thresholds/weights change
# and need re-checking against real history.

on:
  workflow_dispatch: {}

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run backtest
        env:
          TWELVEDATA_API_KEY: ${{ secrets.TWELVEDATA_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python backtest.py