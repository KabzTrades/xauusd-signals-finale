name: Signal Bot Heartbeat

on:
  schedule:
    - cron: "*/5 * * * 1-5"
  workflow_dispatch: {}

# Needed to let the workflow push the updated signal_journal.csv back to
# the repo. concurrency prevents two overlapping runs (e.g. a slow run plus
# the next scheduled one) from racing to push at the same time - queues
# them instead of risking a rejected push or, worse, a lost journal row.
permissions:
  contents: write

concurrency:
  group: signal-bot-heartbeat
  cancel-in-progress: false

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send heartbeat
        env:
          TWELVEDATA_API_KEY: ${{ secrets.TWELVEDATA_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot.py

      - name: Commit signal journal
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add signal_journal.csv
          if ! git diff --cached --quiet; then
            git commit -m "Update signal journal $(date -u +'%Y-%m-%d %H:%M UTC')"
            git pull --rebase
            git push
          else
            echo "No journal changes to commit"
          fi